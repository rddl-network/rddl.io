<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 Not Found — RDDL Foundation</title>
  <meta name="robots" content="noindex">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root{
      --bg-1:#0B1020;
      --bg-2:#0F1B3D;
      --el-blue:#3B82F6;
      --el-cyan:#06B6D4;
      --el-violet:#8B5CF6;
      --el-mint:#34D399;
      --el-yellow:#FACC15;
    }
    body {
      background:
        radial-gradient(1200px 800px at 10% -10%, rgba(59,130,246,.18), transparent 60%),
        radial-gradient(900px 600px at 95% 10%, rgba(6,182,212,.14), transparent 60%),
        linear-gradient(160deg, var(--bg-1), var(--bg-2));
    }
    .glass { background: rgba(255,255,255,.06); backdrop-filter: saturate(1.2) blur(8px); }
    .ring-soft { box-shadow: 0 0 0 1px rgba(148,163,184,.18) inset; }
    .grad-text {
      background: linear-gradient(90deg, var(--el-blue), var(--el-cyan), var(--el-violet));
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--el-blue), var(--el-violet));
      color: white; box-shadow: 0 10px 30px rgba(59,130,246,.25);
    }
    .btn-primary:hover{ filter: brightness(1.07); box-shadow: 0 14px 36px rgba(59,130,246,.35); }
  </style>
  <script>
    setTimeout(function(){ window.location.href = '/'; }, 5000);
  </script>
</head>
<body class="text-slate-100 antialiased flex flex-col min-h-screen">
  <nav class="sticky top-0 z-40 backdrop-blur bg-[#0c1329]/70">
    <div class="mx-auto max-w-7xl px-6">
      <div class="flex h-16 items-center justify-between">
        <div class="flex items-center gap-3">
          <img src="./images/rddl-Ldot-glyph-square-flush-512.png" alt="RDDL logo" class="h-[1.5em] w-[1.5em] object-contain" loading="eager" decoding="async" />
          <span class="text-lg font-semibold tracking-wide">RDDL Foundation</span>
        </div>
      </div>
    </div>
  </nav>
  <main class="flex-1 flex flex-col items-center justify-center px-6 py-24">
    <div class="glass ring-soft rounded-2xl p-10 max-w-lg w-full text-center">
      <h1 class="text-5xl font-extrabold grad-text mb-4">404</h1>
      <h2 class="text-2xl font-bold mb-2">Page Not Found</h2>
      <p class="text-slate-300 mb-6">Sorry, the page you are looking for does not exist.<br>
        You will be redirected to the main page in 5 seconds.</p>
      <a href="/" class="btn-primary rounded-xl px-5 py-3 text-sm font-semibold transition-base">Go to Main Page Now</a>
    </div>
  </main>
</body>
</html>
